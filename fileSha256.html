<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File SHA-256 Hasher</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            max-width: 860px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1a1a1a;
            color: #e0e0e0;
        }
        h1 {
            text-align: center;
            color: #60a5fa;
            margin-bottom: 24px;
        }
        .panel {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        button {
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
        }
        button.secondary {
            background-color: #4b5563;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            word-break: break-all;
            background-color: #111827;
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 10px;
            font-size: 13px;
        }
        .status {
            margin-top: 12px;
            color: #93c5fd;
            font-size: 14px;
        }
        .ok { color: #86efac; }
        .warn { color: #fbbf24; }
        .err { color: #fca5a5; }
    </style>
</head>
<body>
    <h1>File SHA-256 Hasher</h1>

    <div class="panel">
        <input id="fileInput" type="file">
        <div class="row">
            <button id="hashBtn">Compute SHA-256</button>
            <button id="copyBtn" class="secondary" disabled>Copy Hash</button>
        </div>
        <div class="status" id="status">Choose a file and click Compute SHA-256.</div>
    </div>

    <div class="panel">
        <div><strong>Selected file</strong></div>
        <div class="mono" id="fileInfo">No file selected.</div>
    </div>

    <div class="panel">
        <div><strong>SHA-256 hash</strong></div>
        <div class="mono" id="hashOutput">No hash computed yet.</div>
    </div>

    <script>
        const fileInput = document.getElementById("fileInput");
        const hashBtn = document.getElementById("hashBtn");
        const copyBtn = document.getElementById("copyBtn");
        const fileInfo = document.getElementById("fileInfo");
        const hashOutput = document.getElementById("hashOutput");
        const statusEl = document.getElementById("status");

        let lastHash = "";

        function setStatus(message, cssClass) {
            statusEl.className = "status " + cssClass;
            statusEl.textContent = message;
        }

        function bytesToHex(bytes) {
            return Array.from(bytes, b => b.toString(16).padStart(2, "0")).join("");
        }

        function rightRotate(value, amount) {
            return (value >>> amount) | (value << (32 - amount));
        }

        function sha256FallbackBytes(inputBytes) {
            const bytes = Array.from(inputBytes);
            const bitLength = bytes.length * 8;
            bytes.push(0x80);
            while ((bytes.length % 64) !== 56) {
                bytes.push(0);
            }

            const high = Math.floor(bitLength / 0x100000000);
            const low = bitLength >>> 0;
            bytes.push((high >>> 24) & 0xff, (high >>> 16) & 0xff, (high >>> 8) & 0xff, high & 0xff);
            bytes.push((low >>> 24) & 0xff, (low >>> 16) & 0xff, (low >>> 8) & 0xff, low & 0xff);

            const k = [
                0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
            ];

            let h0 = 0x6a09e667;
            let h1 = 0xbb67ae85;
            let h2 = 0x3c6ef372;
            let h3 = 0xa54ff53a;
            let h4 = 0x510e527f;
            let h5 = 0x9b05688c;
            let h6 = 0x1f83d9ab;
            let h7 = 0x5be0cd19;
            const w = new Array(64);

            for (let offset = 0; offset < bytes.length; offset += 64) {
                for (let i = 0; i < 16; i++) {
                    const idx = offset + (i * 4);
                    w[i] = ((bytes[idx] << 24) | (bytes[idx + 1] << 16) | (bytes[idx + 2] << 8) | bytes[idx + 3]) >>> 0;
                }
                for (let i = 16; i < 64; i++) {
                    const s0 = (rightRotate(w[i - 15], 7) ^ rightRotate(w[i - 15], 18) ^ (w[i - 15] >>> 3)) >>> 0;
                    const s1 = (rightRotate(w[i - 2], 17) ^ rightRotate(w[i - 2], 19) ^ (w[i - 2] >>> 10)) >>> 0;
                    w[i] = (w[i - 16] + s0 + w[i - 7] + s1) >>> 0;
                }

                let a = h0;
                let b = h1;
                let c = h2;
                let d = h3;
                let e = h4;
                let f = h5;
                let g = h6;
                let h = h7;

                for (let i = 0; i < 64; i++) {
                    const s1 = (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25)) >>> 0;
                    const ch = ((e & f) ^ ((~e) & g)) >>> 0;
                    const temp1 = (h + s1 + ch + k[i] + w[i]) >>> 0;
                    const s0 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) >>> 0;
                    const maj = ((a & b) ^ (a & c) ^ (b & c)) >>> 0;
                    const temp2 = (s0 + maj) >>> 0;

                    h = g;
                    g = f;
                    f = e;
                    e = (d + temp1) >>> 0;
                    d = c;
                    c = b;
                    b = a;
                    a = (temp1 + temp2) >>> 0;
                }

                h0 = (h0 + a) >>> 0;
                h1 = (h1 + b) >>> 0;
                h2 = (h2 + c) >>> 0;
                h3 = (h3 + d) >>> 0;
                h4 = (h4 + e) >>> 0;
                h5 = (h5 + f) >>> 0;
                h6 = (h6 + g) >>> 0;
                h7 = (h7 + h) >>> 0;
            }

            const out = new Uint8Array(32);
            const words = [h0, h1, h2, h3, h4, h5, h6, h7];
            for (let i = 0; i < words.length; i++) {
                const base = i * 4;
                out[base] = (words[i] >>> 24) & 0xff;
                out[base + 1] = (words[i] >>> 16) & 0xff;
                out[base + 2] = (words[i] >>> 8) & 0xff;
                out[base + 3] = words[i] & 0xff;
            }
            return out;
        }

        async function sha256Bytes(inputBytes) {
            const webCrypto = globalThis.crypto && globalThis.crypto.subtle;
            if (webCrypto) {
                const digest = await webCrypto.digest("SHA-256", inputBytes);
                return new Uint8Array(digest);
            }
            return sha256FallbackBytes(inputBytes);
        }

        async function copyTextToClipboard(text) {
            if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
                await navigator.clipboard.writeText(text);
                return;
            }

            const tempArea = document.createElement("textarea");
            tempArea.value = text;
            tempArea.setAttribute("readonly", "");
            tempArea.style.position = "fixed";
            tempArea.style.opacity = "0";
            tempArea.style.pointerEvents = "none";
            document.body.appendChild(tempArea);
            tempArea.select();
            tempArea.setSelectionRange(0, tempArea.value.length);

            const copied = document.execCommand("copy");
            document.body.removeChild(tempArea);
            if (!copied) {
                throw new Error("Clipboard copy is not available in this browser context.");
            }
        }

        function updateFileInfo(file) {
            if (!file) {
                fileInfo.textContent = "No file selected.";
                return;
            }
            fileInfo.textContent = "Name: " + file.name + "\nSize: " + file.size + " bytes\nType: " + (file.type || "unknown");
        }

        fileInput.addEventListener("change", () => {
            const file = fileInput.files[0];
            updateFileInfo(file);
            lastHash = "";
            hashOutput.textContent = "No hash computed yet.";
            copyBtn.disabled = true;
            if (file) {
                setStatus("File selected. Click Compute SHA-256.", "warn");
            } else {
                setStatus("Choose a file and click Compute SHA-256.", "warn");
            }
        });

        hashBtn.addEventListener("click", async () => {
            const file = fileInput.files[0];
            if (!file) {
                setStatus("Please select a file first.", "err");
                return;
            }

            try {
                setStatus("Hashing file...", "warn");
                hashBtn.disabled = true;
                copyBtn.disabled = true;

                const arrayBuffer = await file.arrayBuffer();
                const bytes = new Uint8Array(arrayBuffer);
                const digestBytes = await sha256Bytes(bytes);
                const hashHex = bytesToHex(digestBytes);

                lastHash = hashHex;
                hashOutput.textContent = hashHex;
                copyBtn.disabled = false;
                setStatus("SHA-256 computed.", "ok");
            } catch (err) {
                const msg = err instanceof Error ? err.message : "Unknown hashing error.";
                setStatus("Failed to hash file: " + msg, "err");
            } finally {
                hashBtn.disabled = false;
            }
        });

        copyBtn.addEventListener("click", async () => {
            if (!lastHash) {
                setStatus("No hash to copy yet.", "err");
                return;
            }
            try {
                await copyTextToClipboard(lastHash);
                setStatus("Hash copied to clipboard.", "ok");
            } catch (err) {
                const msg = err instanceof Error ? err.message : "Unknown copy error.";
                setStatus("Copy failed: " + msg, "err");
            }
        });

        if (!(globalThis.crypto && globalThis.crypto.subtle)) {
            setStatus("Web Crypto unavailable in this context. Using built-in SHA-256 fallback.", "warn");
        }
    </script>
</body>
</html>
