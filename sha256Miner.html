<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA-256 Lowest Hash Miner</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1a1a1a;
            color: #e0e0e0;
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #60a5fa;
        }
        .panel {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .field {
            flex: 1 1 220px;
            min-width: 220px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 6px;
        }
        input[type="text"], textarea {
            width: 100%;
            box-sizing: border-box;
            background-color: #363636;
            border: 1px solid #4b5563;
            border-radius: 6px;
            color: #e5e7eb;
            padding: 10px;
            font-size: 14px;
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        button {
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
        }
        button.secondary {
            background-color: #4b5563;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            font-size: 14px;
            color: #93c5fd;
        }
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            word-break: break-all;
            background-color: #111827;
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 10px;
            font-size: 13px;
        }
        .ok { color: #86efac; }
        .warn { color: #fbbf24; }
        .err { color: #fca5a5; }
    </style>
</head>
<body>
    <h1>SHA-256 Lowest Hash Miner</h1>

    <div class="panel">
        <div class="row">
            <div class="field">
                <label for="inputText">Input string</label>
                <input id="inputText" type="text" placeholder="Enter base input text">
            </div>
            <div class="field">
                <label for="batchSize">Batch size (hashes per cycle)</label>
                <input id="batchSize" type="text" value="250">
            </div>
        </div>
        <div class="row">
            <button id="startBtn">Start</button>
            <button id="pauseResumeBtn" class="secondary">Pause</button>
            <button id="copyBtn">Copy State as JSON</button>
            <button id="downloadBtn">Download State JSON</button>
            <button id="uploadBtn" class="secondary">Upload JSON + Verify + Continue</button>
            <input id="fileInput" type="file" accept="application/json" style="display:none;">
        </div>
        <div class="status" id="runtimeStatus">Idle - press Start to begin mining.</div>
    </div>

    <div class="panel">
        <div class="row">
            <div class="field">
                <label>Current nonce</label>
                <div class="mono" id="currentNonce">0</div>
            </div>
            <div class="field">
                <label>Total hashes tried</label>
                <div class="mono" id="totalHashes">0</div>
            </div>
            <div class="field">
                <label>Hashes/second (approx)</label>
                <div class="mono" id="hashRate">0</div>
            </div>
        </div>
    </div>

    <div class="panel">
        <label>Best (lowest) hash so far</label>
        <div class="mono" id="bestDisplay">No result yet.</div>
    </div>

    <div class="panel">
        <label>Verification / upload status</label>
        <div class="mono" id="verifyStatus">No uploaded JSON verified yet.</div>
    </div>

    <script>
        const encoder = new TextEncoder();

        const state = {
            hasStarted: false,
            isPaused: false,
            currentNonce: 0,
            totalHashes: 0,
            best: null,
            lastRateSampleTime: performance.now(),
            lastRateSampleCount: 0
        };

        const inputTextEl = document.getElementById("inputText");
        const batchSizeEl = document.getElementById("batchSize");
        const startBtn = document.getElementById("startBtn");
        const pauseResumeBtn = document.getElementById("pauseResumeBtn");
        const copyBtn = document.getElementById("copyBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        const uploadBtn = document.getElementById("uploadBtn");
        const fileInput = document.getElementById("fileInput");
        const runtimeStatusEl = document.getElementById("runtimeStatus");
        const currentNonceEl = document.getElementById("currentNonce");
        const totalHashesEl = document.getElementById("totalHashes");
        const hashRateEl = document.getElementById("hashRate");
        const bestDisplayEl = document.getElementById("bestDisplay");
        const verifyStatusEl = document.getElementById("verifyStatus");

        function buildPreimage(input, nonce) {
            return input + "|" + nonce;
        }

        function bytesToHex(bytes) {
            return Array.from(bytes, b => b.toString(16).padStart(2, "0")).join("");
        }

        function compareByteArrays(a, b) {
            const len = Math.min(a.length, b.length);
            for (let i = 0; i < len; i++) {
                if (a[i] < b[i]) return -1;
                if (a[i] > b[i]) return 1;
            }
            return a.length - b.length;
        }

        function rightRotate(value, amount) {
            return (value >>> amount) | (value << (32 - amount));
        }

        function sha256FallbackBytes(text) {
            const bytes = Array.from(encoder.encode(text));
            const bitLength = bytes.length * 8;

            bytes.push(0x80);
            while ((bytes.length % 64) !== 56) {
                bytes.push(0);
            }

            const high = Math.floor(bitLength / 0x100000000);
            const low = bitLength >>> 0;
            bytes.push((high >>> 24) & 0xff, (high >>> 16) & 0xff, (high >>> 8) & 0xff, high & 0xff);
            bytes.push((low >>> 24) & 0xff, (low >>> 16) & 0xff, (low >>> 8) & 0xff, low & 0xff);

            const k = [
                0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
            ];

            let h0 = 0x6a09e667;
            let h1 = 0xbb67ae85;
            let h2 = 0x3c6ef372;
            let h3 = 0xa54ff53a;
            let h4 = 0x510e527f;
            let h5 = 0x9b05688c;
            let h6 = 0x1f83d9ab;
            let h7 = 0x5be0cd19;

            const w = new Array(64);

            for (let offset = 0; offset < bytes.length; offset += 64) {
                for (let i = 0; i < 16; i++) {
                    const idx = offset + (i * 4);
                    w[i] = ((bytes[idx] << 24) | (bytes[idx + 1] << 16) | (bytes[idx + 2] << 8) | bytes[idx + 3]) >>> 0;
                }
                for (let i = 16; i < 64; i++) {
                    const s0 = (rightRotate(w[i - 15], 7) ^ rightRotate(w[i - 15], 18) ^ (w[i - 15] >>> 3)) >>> 0;
                    const s1 = (rightRotate(w[i - 2], 17) ^ rightRotate(w[i - 2], 19) ^ (w[i - 2] >>> 10)) >>> 0;
                    w[i] = (w[i - 16] + s0 + w[i - 7] + s1) >>> 0;
                }

                let a = h0;
                let b = h1;
                let c = h2;
                let d = h3;
                let e = h4;
                let f = h5;
                let g = h6;
                let h = h7;

                for (let i = 0; i < 64; i++) {
                    const s1 = (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25)) >>> 0;
                    const ch = ((e & f) ^ ((~e) & g)) >>> 0;
                    const temp1 = (h + s1 + ch + k[i] + w[i]) >>> 0;
                    const s0 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) >>> 0;
                    const maj = ((a & b) ^ (a & c) ^ (b & c)) >>> 0;
                    const temp2 = (s0 + maj) >>> 0;

                    h = g;
                    g = f;
                    f = e;
                    e = (d + temp1) >>> 0;
                    d = c;
                    c = b;
                    b = a;
                    a = (temp1 + temp2) >>> 0;
                }

                h0 = (h0 + a) >>> 0;
                h1 = (h1 + b) >>> 0;
                h2 = (h2 + c) >>> 0;
                h3 = (h3 + d) >>> 0;
                h4 = (h4 + e) >>> 0;
                h5 = (h5 + f) >>> 0;
                h6 = (h6 + g) >>> 0;
                h7 = (h7 + h) >>> 0;
            }

            const out = new Uint8Array(32);
            const words = [h0, h1, h2, h3, h4, h5, h6, h7];
            for (let i = 0; i < words.length; i++) {
                const base = i * 4;
                out[base] = (words[i] >>> 24) & 0xff;
                out[base + 1] = (words[i] >>> 16) & 0xff;
                out[base + 2] = (words[i] >>> 8) & 0xff;
                out[base + 3] = words[i] & 0xff;
            }
            return out;
        }

        async function sha256Bytes(text) {
            const webCrypto = globalThis.crypto && globalThis.crypto.subtle;
            if (webCrypto) {
                const data = encoder.encode(text);
                const digest = await webCrypto.digest("SHA-256", data);
                return new Uint8Array(digest);
            }
            return sha256FallbackBytes(text);
        }

        function bestToJson(best) {
            const parsedBatch = Number.parseInt(batchSizeEl.value, 10);
            const batchSize = Number.isFinite(parsedBatch) && parsedBatch > 0 ? parsedBatch : 250;
            return {
                algorithm: "SHA-256",
                input: best.input,
                best_nonce: best.nonce,
                current_nonce: state.currentNonce,
                batch_size: batchSize,
                preimage: best.preimage,
                hash: best.hash
            };
        }

        function updateStatsDisplay() {
            currentNonceEl.textContent = String(state.currentNonce);
            totalHashesEl.textContent = String(state.totalHashes);
            if (!state.best) {
                bestDisplayEl.textContent = "No result yet.";
                return;
            }

            bestDisplayEl.textContent = JSON.stringify(bestToJson(state.best), null, 2);
        }

        function updateHashRate() {
            const now = performance.now();
            const elapsed = (now - state.lastRateSampleTime) / 1000;
            if (elapsed < 0.5) {
                return;
            }
            const delta = state.totalHashes - state.lastRateSampleCount;
            const rate = elapsed > 0 ? Math.round(delta / elapsed) : 0;
            hashRateEl.textContent = String(rate);
            state.lastRateSampleTime = now;
            state.lastRateSampleCount = state.totalHashes;
        }

        function setVerifyMessage(message, cssClass) {
            verifyStatusEl.className = "mono " + cssClass;
            verifyStatusEl.textContent = message;
        }

        async function copyTextToClipboard(text) {
            if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
                await navigator.clipboard.writeText(text);
                return;
            }

            const tempArea = document.createElement("textarea");
            tempArea.value = text;
            tempArea.setAttribute("readonly", "");
            tempArea.style.position = "fixed";
            tempArea.style.opacity = "0";
            tempArea.style.pointerEvents = "none";
            document.body.appendChild(tempArea);
            tempArea.select();
            tempArea.setSelectionRange(0, tempArea.value.length);

            const copied = document.execCommand("copy");
            document.body.removeChild(tempArea);
            if (!copied) {
                throw new Error("Clipboard copy is not available in this browser context.");
            }
        }

        async function mineLoop() {
            while (true) {
                if (state.hasStarted && !state.isPaused) {
                    const input = inputTextEl.value;
                    const parsedBatch = Number.parseInt(batchSizeEl.value, 10);
                    const batchSize = Number.isFinite(parsedBatch) && parsedBatch > 0 ? parsedBatch : 250;

                    for (let i = 0; i < batchSize && !state.isPaused; i++) {
                        const nonce = state.currentNonce;
                        const preimage = buildPreimage(input, nonce);
                        const hashBytes = await sha256Bytes(preimage);
                        const hashHex = bytesToHex(hashBytes);

                        state.totalHashes += 1;
                        if (!state.best || compareByteArrays(hashBytes, state.best.hashBytes) < 0) {
                            state.best = {
                                input,
                                nonce,
                                preimage,
                                hash: hashHex,
                                hashBytes
                            };
                            updateStatsDisplay();
                        }

                        state.currentNonce += 1;
                    }
                    updateStatsDisplay();
                    updateHashRate();
                }
                await new Promise(resolve => setTimeout(resolve, 0));
            }
        }

        startBtn.addEventListener("click", () => {
            if (state.hasStarted) {
                return;
            }
            state.hasStarted = true;
            state.isPaused = false;
            runtimeStatusEl.textContent = "Mining...";
            startBtn.disabled = true;
            pauseResumeBtn.textContent = "Pause";
        });

        pauseResumeBtn.addEventListener("click", () => {
            if (!state.hasStarted) {
                return;
            }
            state.isPaused = !state.isPaused;
            pauseResumeBtn.textContent = state.isPaused ? "Resume" : "Pause";
            runtimeStatusEl.textContent = state.isPaused ? "Paused" : "Mining...";
        });

        copyBtn.addEventListener("click", async () => {
            if (!state.best) {
                setVerifyMessage("Nothing to copy yet - no best hash found.", "warn");
                return;
            }
            const jsonText = JSON.stringify(bestToJson(state.best), null, 2);
            try {
                await copyTextToClipboard(jsonText);
                setVerifyMessage("Copied state JSON to clipboard.", "ok");
            } catch (err) {
                const msg = err instanceof Error ? err.message : "Unknown copy error.";
                setVerifyMessage("Copy failed: " + msg, "err");
            }
        });

        downloadBtn.addEventListener("click", () => {
            if (!state.best) {
                setVerifyMessage("Nothing to download yet - no best hash found.", "warn");
                return;
            }
            const jsonText = JSON.stringify(bestToJson(state.best), null, 2);
            const blob = new Blob([jsonText], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "sha256-miner-state.json";
            a.click();
            URL.revokeObjectURL(url);
            setVerifyMessage("Downloaded state JSON.", "ok");
        });

        uploadBtn.addEventListener("click", () => {
            fileInput.value = "";
            fileInput.click();
        });

        fileInput.addEventListener("change", async () => {
            const file = fileInput.files[0];
            if (!file) {
                return;
            }

            try {
                const text = await file.text();
                const data = JSON.parse(text);

                if (data.algorithm !== "SHA-256") {
                    throw new Error("Unsupported algorithm. Expected SHA-256.");
                }
                if (typeof data.input !== "string") {
                    throw new Error("Invalid JSON: input must be a string.");
                }
                if (!Number.isInteger(data.best_nonce) || data.best_nonce < 0) {
                    throw new Error("Invalid JSON: best_nonce must be a non-negative integer.");
                }
                if (!Number.isInteger(data.current_nonce) || data.current_nonce < 0) {
                    throw new Error("Invalid JSON: current_nonce must be a non-negative integer.");
                }
                if (data.current_nonce < data.best_nonce) {
                    throw new Error("Invalid JSON: current_nonce cannot be less than best_nonce.");
                }
                if (!Number.isInteger(data.batch_size) || data.batch_size <= 0) {
                    throw new Error("Invalid JSON: batch_size must be a positive integer.");
                }
                if (typeof data.preimage !== "string" || typeof data.hash !== "string") {
                    throw new Error("Invalid JSON: preimage and hash must be strings.");
                }

                const expectedPreimage = buildPreimage(data.input, data.best_nonce);
                if (data.preimage !== expectedPreimage) {
                    throw new Error("Preimage does not match input + best_nonce.");
                }

                const actualBytes = await sha256Bytes(data.preimage);
                const actualHash = bytesToHex(actualBytes);
                if (actualHash !== data.hash.toLowerCase()) {
                    throw new Error("Hash does not match SHA-256(preimage).");
                }

                const importedBest = {
                    input: data.input,
                    nonce: data.best_nonce,
                    preimage: data.preimage,
                    hash: actualHash,
                    hashBytes: actualBytes
                };

                state.best = importedBest;
                inputTextEl.value = data.input;
                state.currentNonce = data.current_nonce;
                batchSizeEl.value = String(data.batch_size);
                state.hasStarted = true;
                state.isPaused = false;
                startBtn.disabled = true;
                pauseResumeBtn.textContent = "Pause";
                runtimeStatusEl.textContent = "Mining...";
                updateStatsDisplay();
                setVerifyMessage("Uploaded JSON verified. Displayed and mining continues from current_nonce.", "ok");
            } catch (err) {
                const msg = err instanceof Error ? err.message : "Unknown upload error.";
                setVerifyMessage("Upload/verify failed: " + msg, "err");
            }
        });

        if (!(globalThis.crypto && globalThis.crypto.subtle)) {
            setVerifyMessage("Web Crypto unavailable in this context. Using built-in SHA-256 fallback.", "warn");
        }

        updateStatsDisplay();
        mineLoop();
    </script>
</body>
</html>
